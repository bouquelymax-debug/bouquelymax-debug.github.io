<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — Maison Matière Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body{background:var(--plaster);display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#fff;border:1px solid var(--line);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 12px 40px rgba(30,33,39,.1)}
    .login-box h1{font-size:22px;margin-bottom:4px}
    .login-box .sub{font-size:14px;color:var(--stone);margin-bottom:28px}
    .field{margin-bottom:16px}
    .err{color:#c0392b;font-size:14px;margin-top:12px;display:none}
  </style>
</head>
<body>
<div class="login-box">
  <div class="fbrand" style="font-family:'Space Grotesk';font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin-bottom:20px">Maison Matière</div>
  <h1>Espace artisan</h1>
  <p class="sub">Connectez-vous pour gérer vos chantiers</p>
  <form id="loginForm">
    <div class="field"><label>E-mail</label><input type="email" id="email" placeholder="votre@email.fr" required></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="password" placeholder="••••••••" required></div>
    <button class="btn" type="submit" style="width:100%">Se connecter</button>
    <div class="err" id="err">E-mail ou mot de passe incorrect.</div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si déjà connecté, rediriger
  sb.auth.getSession().then(({ data }) => {
    if (data.session) location.href = 'dashboard.html';
  });

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button');
    btn.textContent = 'Connexion…';
    btn.disabled = true;
    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });
    if (error) {
      document.getElementById('err').style.display = 'block';
      btn.textContent = 'Se connecter';
      btn.disabled = false;
    } else {
      location.href = 'dashboard.html';
    }
  });
</script>
</body>
</html>
